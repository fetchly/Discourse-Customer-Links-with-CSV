custom_profile_link_user_field_ids:
  type: list
  default: "1|"
  description: The id(s) of your custom user field(s), e.g. 1, 2, etc.

custom_profile_link_csv_1:
  type: string
  textarea: true
  default: ""
  description: "CSV mapping for field ID 1 (first entry in field IDs list). One entry per line in 'value,https://url' format. The value must exactly match the user's dropdown selection."

